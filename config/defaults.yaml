# =============================================================================
# 共通デフォルト設定 (各ノードの設定でオーバーライド可能)
# =============================================================================

training:
  epochs: 5
  batch_size: 32
  learning_rate: 0.01
  optimizer: "sgd"              # "sgd" | "adam"
  momentum: 0.9
  weight_decay: 0.0001

device: "auto"                  # "auto" | "cpu" | "cuda"
