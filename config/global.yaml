# =============================================================================
# Global Server 設定
# =============================================================================

server:
  address: "0.0.0.0:8080"
  num_rounds: 10
  round_timeout: 300.0          # 秒。Edgeからの応答待ち上限
  min_fit_clients: 1            # 最低参加Edge数
  min_available_clients: 1      # 起動待ち最低Edge数
  fraction_fit: 1.0             # 各ラウンドで参加させるEdgeの割合

# 集約戦略 ("fedavg" のみ。将来 "fedprox", "scaffold" 等を追加可能)
strategy:
  name: "fedavg"
  params: {}

# モデル定義
model:
  name: "simplecnn"             # "simplecnn" | "resnet18" (将来追加)
  num_classes: 10

# データセット (Global Server側のテスト用)
dataset:
  name: "cifar10"               # "cifar10" | "mnist"
  test_batch_size: 128

# 評価
evaluation:
  enabled: true
  log_dir: "./runs"             # TensorBoard ログ出力先

# 動作モード
mode: "production"              # "production" | "dry_run"
dry_run:
  num_rounds: 1
  dummy_data_size: 64
  dummy_steps: 2
